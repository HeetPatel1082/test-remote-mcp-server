services:
  - type: web
    name: heet-expenses-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_HOURS
        value: "72"
      - key: MCP_BASE_URL
        value: "https://heet-expenses-mcp.onrender.com"
